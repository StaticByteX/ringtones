<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>StaticByteX | Retro Ringtones for C64 / Amiga / DOS / Windows</title>

  <link rel="icon" type="image/png" href="assets/staticbytex-favicon.png" />
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header class="site-header">
    <img
      src="assets/staticbytex-logo.png"
      alt="StaticByteX logo"
      class="logo"
    />
  </header>

  <main class="site-main">
    <h1>Retro Ringtones &amp; Notification Sounds</h1>

    <p class="subtitle platform-line">
      Commodore 64 • Amiga 500 • DOS • Windows
    </p>

    <div class="search-wrapper">
      <input
        type="text"
        id="search"
        placeholder="Search title, composer, production, publisher…"
        autocomplete="off"
        spellcheck="false"
      />
      <button id="search-clear" class="search-clear">×</button>
    </div>

    <div class="filters-row">
      <div class="filters filters-platform">
        <button class="active" data-filter="all">ALL</button>
        <button data-filter="c64">C64</button>
        <button data-filter="a500">AMIGA</button>
        <button data-filter="dos">DOS</button>
        <button data-filter="win">WIN</button>
      </div>

      <div class="filters filters-type">
        <button class="active" data-type-filter="all">ALL TYPES</button>
        <button data-type-filter="Ringtone">RINGTONES</button>
        <button data-type-filter="Notification">NOTIFICATIONS</button>
      </div>
    </div>

    <div class="sort-row">
      <span class="sort-label">SORT BY:</span>
      <div class="sort-buttons">
        <button class="active" data-sort="title">TITLE</button>
        <button data-sort="handle">HANDLE</button>
        <button data-sort="name">NAME</button>
        <button data-sort="group">GROUP</button>
        <button data-sort="production">PRODUCTION</button>
        <button data-sort="publisher">PUBLISHER</button>
      </div>
    </div>

    <p id="results-info" class="results-info"></p>

    <div id="tracklist"></div>
  </main>

  <footer class="site-footer">
    <img
      src="assets/staticbytex-qr-code.png"
      alt="StaticByteX Instagram QR"
      class="qr"
    />
  </footer>

  <script src="script.js"></script>
</body>
</html>
