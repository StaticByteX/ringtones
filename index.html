<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StaticByteX | Retro Ringtones</title>

<link rel="icon" type="image/png" href="/ringtones/assets/staticbytex-favicon.png">

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>

<body>

<header>
  <img src="/ringtones/assets/staticbytex-logo.png" alt="StaticByteX logo" style="width:120px; height:auto;">
</header>

<main>

  <h1>Retro Ringtones & Notification Sounds</h1>
  <h2>Commodore 64 • Amiga 500 • DOS PC</h2>

  <!-- FILTER -->
  <div class="filters">
    <button onclick="setFilter('all')">All</button>
    <button onclick="setFilter('c64')">C64</button>
    <button onclick="setFilter('a500')">Amiga</button>
    <button onclick="setFilter('dos')">DOS</button>
  </div>

  <!-- TRACK LIST -->
  <div id="tracklist"></div>

</main>

<script src="script.js"></script>

</body>
</html>
