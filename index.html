<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>StaticByteX | Retro Ringtones for C64/A500/PC</title>

  <link rel="icon" type="image/png" href="assets/staticbytex-favicon.png" />

  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header>
    <img class="logo" src="assets/staticbytex-logo.png" alt="StaticByteX logo" />
  </header>

  <main>
    <h1>Retro Ringtones & Notification Sounds</h1>
    <p class="subtitle platform-line">Commodore 64 • Amiga 500 • DOS/Windows PC</p>

    <input
      type="text"
      id="search"
      placeholder="Search title, composer, name, group, production, year, publisher..."
      autocomplete="off"
      spellcheck="false"
    />

    <div class="filters" aria-label="Platform filters">
      <button id="btn-all" class="active" type="button" data-filter="all">All</button>
      <button id="btn-c64" type="button" data-filter="c64">C64</button>
      <button id="btn-a500" type="button" data-filter="a500">Amiga</button>
      <button id="btn-pc" type="button" data-filter="pc">PC</button>
    </div>

    <div class="filters filters-type" aria-label="Type filters">
      <button id="btn-type-all" class="active" type="button" data-type-filter="all">All types</button>
      <button id="btn-type-ringtone" type="button" data-type-filter="Ringtone">Ringtones</button>
      <button id="btn-type-notification" type="button" data-type-filter="Notification">Notifications</button>
    </div>

    <p id="results-info" class="subtitle results-info" aria-live="polite"></p>
    <p id="ios-hint" class="subtitle ios-hint" aria-live="polite"></p>

    <div id="tracklist"></div>
  </main>

  <footer>
    <p class="subtitle submit-line">Submit your ringtone suggestions on Instagram ↓</p>

    <a
      href="https://www.instagram.com/staticbytex/"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="StaticByteX on Instagram"
    >
      <img class="qr" src="assets/staticbytex-qr-code.png" alt="StaticByteX QR code" />
    </a>

    <p class="subtitle footer-line">Retro ringtones • C64/A500/PC • 100% free • No app required</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
